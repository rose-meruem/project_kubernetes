replicaCount: 1

image:
  repository: url-shortener
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: ""
  host: localhost
  annotations: {}
  tls:
    enabled: false
    secretName: ""

app:
  port: 8000
  databaseUrl: postgresql+psycopg://urlshortener:urlshortener@url-shortener-postgres:5432/urlshortener

postgres:
  enabled: true
  image: postgres:16-alpine
  database: urlshortener
  user: urlshortener
  password: urlshortener
  existingSecret: ""
  port: 5432
  storageSize: 1Gi
  storageClass: ""

probes:
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 20
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 2

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
  interval: 30s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
