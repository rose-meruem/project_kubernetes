{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: url-shortener-postgres
  labels:
    {{- include "url-shortener.postgresLabels" . | nindent 4 }}
spec:
  serviceName: url-shortener-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "url-shortener.postgresSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "url-shortener.postgresLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: url-shortener-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-postgres
  labels:
    {{- include "url-shortener.postgresLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "url-shortener.postgresSelectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
{{- end }}
