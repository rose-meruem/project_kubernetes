{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "url-shortener.fullname" . }}-api
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "url-shortener.apiSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.app.port }}
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "url-shortener.postgresSelectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.postgres.port }}
          protocol: TCP
    {{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "url-shortener.fullname" . }}-postgres
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "url-shortener.postgresSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "url-shortener.apiSelectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.postgres.port }}
          protocol: TCP
  egress: []
{{- end }}
{{- end }}
