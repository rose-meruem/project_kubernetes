{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-postgres
  labels:
    app.kubernetes.io/name: url-shortener-postgres
    app.kubernetes.io/part-of: sovereign-kubernetes-idp-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: url-shortener-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: url-shortener-postgres
        app.kubernetes.io/part-of: sovereign-kubernetes-idp-lab
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: url-shortener-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-postgres
  labels:
    app.kubernetes.io/name: url-shortener-postgres
    app.kubernetes.io/part-of: sovereign-kubernetes-idp-lab
spec:
  selector:
    app.kubernetes.io/name: url-shortener-postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
{{- end }}
