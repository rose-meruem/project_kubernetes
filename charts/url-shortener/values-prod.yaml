replicaCount: 2

image:
  repository: 805393736963.dkr.ecr.eu-west-1.amazonaws.com/url-shortener
  tag: sha-238625f
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  host: short.younessb.dev
  tls:
    enabled: true
    secretName: short-younessb-dev-tls

postgres:
  storageSize: 10Gi
  existingSecret: url-shortener-postgres-secret

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

networkPolicy:
  enabled: true
