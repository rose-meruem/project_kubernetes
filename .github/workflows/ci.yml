name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ECR_REPOSITORY: url-shortener

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: urlshortener
          POSTGRES_USER: urlshortener
          POSTGRES_PASSWORD: urlshortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        working-directory: app
        env:
          DATABASE_URL: postgresql+psycopg://urlshortener:urlshortener@localhost:5432/urlshortener
        run: python -m pytest -q

  build-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            -t "${FULL_IMAGE}:${IMAGE_TAG}" \
            -t "${FULL_IMAGE}:latest" \
            ./app

          docker push "${FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${FULL_IMAGE}:latest"

          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update prod image tag
        env:
          IMAGE: ${{ steps.build.outputs.image }}
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          sed -i "s|^  repository:.*|  repository: ${IMAGE}|" charts/url-shortener/values-prod.yaml
          sed -i "s|^  tag:.*|  tag: ${TAG}|" charts/url-shortener/values-prod.yaml

      - name: Commit updated values
        env:
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/url-shortener/values-prod.yaml
          git diff --staged --quiet || git commit -m "ci: update prod image to ${TAG}"
          git push
